<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Arcade Bar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="header">
      <a class="logo" href="index.html">Arcade Bar</a>

      <nav aria-label="Main navigation">
        <ul class="nav">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="play.html">Play</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <div class="auth-buttons">
        <a class="login-btn" href="login.html">Login</a>
        <a class="login-btn" href="signup.html">Sign Up</a>
      </div>
    </header>

    <main id="main-content">
      <section class="section-hero login-hero">
        <div class="hero-content">
          <p class="hero-tag">Welcome back, player.</p>
          <h1>Login</h1>
          <p class="hero-text">Sign in to see events, specials, and VIP updates.</p>
        </div>
      </section>

      <section class="container page-section">
        <div class="login-card">
          <h2>Member Login</h2>

          <form class="login-form" action="#" method="post">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
            </div>

            <button type="submit" class="login-submit">Login</button>
          </form>

          <p class="login-text">Don't have an account? <a href="signup.html">Sign up here</a></p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026, The Arcade Bar</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
